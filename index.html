<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control Remoto - Alabanzas Iglesia</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1e1e24; color: #fff; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #4f46e5; margin-bottom: 4px; }
    #estado-conexion {
      text-align: center; font-size: 0.78rem; margin-bottom: 16px;
      padding: 6px 12px; border-radius: 20px; display: inline-block; width: 100%;
    }
    .estado-ok    { background: rgba(34,197,94,0.15);  color: #4ade80; }
    .estado-error { background: rgba(239,68,68,0.15);  color: #f87171; }
    .estado-carga { background: rgba(79,70,229,0.15);  color: #a5b4fc; }

    .container { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; height: 78vh; }
    .panel { flex: 1; background: #2a2a35; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; }
    h2 { margin-top: 0; border-bottom: 2px solid #3f3f56; padding-bottom: 8px; font-size: 1.1rem;
         display: flex; justify-content: space-between; align-items: center; }
    .badge { font-size: 0.7rem; background: #3f3f56; padding: 2px 8px; border-radius: 10px; color: #a5b4fc; }

    .search-wrap { position: relative; margin-bottom: 8px; }
    .search-wrap svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
    .search-input {
      width: 100%; background: #3f3f56; border: 1px solid #555570; border-radius: 6px;
      color: #fff; padding: 7px 10px 7px 30px; font-size: 0.82rem; outline: none;
    }
    .search-input:focus { border-color: #4f46e5; }

    .list { overflow-y: auto; flex: 1; list-style: none; padding: 0; margin: 0; }
    li {
      background: #3f3f56; padding: 9px 10px; margin-bottom: 6px; border-radius: 4px;
      cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      transition: background 0.15s; font-size: 0.85rem;
    }
    li:hover { background: #4f46e5; }
    li .nombre { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 8px; }
    li.ya-en-lista { opacity: 0.45; }

    .btn { background: #4f46e5; color: white; border: none; padding: 12px; border-radius: 6px;
           font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 1rem; }
    .btn:hover:not(:disabled) { background: #4338ca; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-add    { background: #22c55e; border: none; color: white; padding: 4px 9px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; flex-shrink: 0; }
    .btn-remove { background: #ef4444; border: none; color: white; padding: 4px 9px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; flex-shrink: 0; }
    .btn-up, .btn-down { background: #6366f1; border: none; color: white; padding: 3px 7px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; flex-shrink: 0; }
    .btn-reload { background: #6366f1; border: none; color: white; padding: 5px 12px; border-radius: 6px;
                  cursor: pointer; font-size: 0.75rem; margin-left: 8px; }

    .empty { text-align: center; color: #666; padding: 30px 10px; font-size: 0.82rem; line-height: 1.8; }
    .debug-box { background: #111; border: 1px solid #333; border-radius: 6px; padding: 10px;
                 font-size: 0.7rem; color: #f87171; font-family: monospace; white-space: pre-wrap;
                 margin-top: 8px; max-height: 120px; overflow-y: auto; }

    /* Instrucciones cuando hay error */
    .pasos { background: rgba(79,70,229,0.1); border: 1px solid #4f46e5; border-radius: 8px;
             padding: 12px 16px; margin-top: 8px; font-size: 0.78rem; line-height: 1.9; }
    .pasos strong { color: #a5b4fc; }
  </style>
</head>
<body>
  <h1>Planificador Domingo 🎶</h1>
  <div style="text-align:center">
    <span id="estado-conexion" class="estado-carga">⏳ Conectando...</span>
    <button class="btn-reload" onclick="cargarDatos()" title="Reintentar conexión">🔄 Reintentar</button>
  </div>

  <div class="container" style="margin-top:12px">
    <div class="panel">
      <h2>Videos en PC Iglesia <span class="badge" id="badge-disponibles">0</span></h2>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" class="search-input" id="buscar" placeholder="Buscar video..." oninput="filtrar(this.value)">
      </div>
      <ul id="lista-disponibles" class="list">
        <li><span class="nombre">Esperando conexión...</span></li>
      </ul>
    </div>

    <div class="panel">
      <h2>Playlist del Domingo <span class="badge" id="badge-domingo">0</span></h2>
      <ul id="lista-domingo" class="list"></ul>
      <button class="btn" id="btn-guardar" onclick="guardarPlaylist()">💾 Guardar Playlist</button>
    </div>
  </div>

  <script>
    const API_KEY      = '$2a$10$FC02j5gbHIHKA.wnoYQNqegrrC4EBf/gCyx1lR/oBRGi99Bj7aemC';
    const BIN_VIDEOS   = '6a4171f1da38895dfe0cb6b8';
    const BIN_PLAYLIST = '6a41792df5f4af5e293e5e04';

    let videosIglesia   = [];
    let playlistDomingo = [];
    let filtroActual    = '';

    function setEstado(msg, tipo) {
      const el = document.getElementById('estado-conexion');
      el.textContent = msg;
      el.className = 'estado-' + tipo;
    }

    /* ── Fetch con timeout de 12 s ── */
    async function fetchBin(binId) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 12000);
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
          signal: controller.signal,
          headers: { 'X-Master-Key': API_KEY }
        });
        clearTimeout(timer);
        const text = await res.text();
        if (!res.ok) throw new Error(`HTTP ${res.status} — ${text.substring(0, 200)}`);
        return JSON.parse(text);
      } catch (err) {
        clearTimeout(timer);
        if (err.name === 'AbortError') throw new Error('Timeout: JSONBin no respondió en 12 segundos.');
        throw err;
      }
    }

    /* ── Extrae videos de cualquier estructura posible ── */
    function extraerVideos(record) {
      if (record && Array.isArray(record.videos)) return record.videos;
      if (Array.isArray(record))                  return record;
      if (record && Array.isArray(record.data))   return record.data;
      return null;
    }

    /* ── Carga principal ── */
    async function cargarDatos() {
      setEstado('⏳ Leyendo videos de la iglesia...', 'carga');
      const panelDisp = document.getElementById('lista-disponibles');
      panelDisp.innerHTML = '<li><span class="nombre">Conectando con JSONBin...</span></li>';

      try {
        /* — Videos disponibles — */
        const dataVideos = await fetchBin(BIN_VIDEOS);
        const todos = extraerVideos(dataVideos.record);

        if (!todos) {
          // Mostrar estructura real recibida para diagnóstico
          const estructura = JSON.stringify(dataVideos.record, null, 2);
          setEstado('⚠️ Estructura inesperada en el Bin de videos', 'error');
          panelDisp.innerHTML = `
            <div class="empty">
              El Bin de videos tiene una estructura que no se reconoce.<br>
              <strong>Abre la app de la iglesia</strong> para que suba los datos correctos.<br><br>
              <small style="color:#888">Estructura recibida:</small>
            </div>
            <div class="debug-box">${estructura.substring(0, 500)}</div>`;
          return;
        }

        // Filtrar solo archivos de video reales
        videosIglesia = todos.filter(v =>
          v && v.filename && !v.isFolder &&
          /\.(mp4|mkv|avi|webm|mov)$/i.test(v.filename)
        );

        /* — Playlist guardada — */
        try {
          const dataPlay = await fetchBin(BIN_PLAYLIST);
          const raw = dataPlay.record;
          const arr = Array.isArray(raw?.playlist) ? raw.playlist
                    : Array.isArray(raw) ? raw : [];
          playlistDomingo = arr.filter(x => x && x !== 'inicio');
        } catch (playErr) {
          console.warn('Playlist previa no disponible:', playErr.message);
          playlistDomingo = [];
        }

        if (videosIglesia.length === 0) {
          setEstado(`⚠️ Conexión OK pero no hay videos en la carpeta todavía`, 'error');
          panelDisp.innerHTML = `
            <div class="empty">
              JSONBin respondió correctamente pero la carpeta<br>
              <strong>C:\\Videos\\alabanzas</strong> parece estar vacía.<br><br>
              <strong>Pasos para solucionar:</strong>
            </div>
            <div class="pasos">
              1. Abre la app <strong>Remanente Multimedia</strong> en la PC de la iglesia<br>
              2. Espera 5 segundos a que sincronice automáticamente<br>
              3. Haz clic en 🔄 <strong>Reintentar</strong> arriba
            </div>`;
          return;
        }

        setEstado(`✅ ${videosIglesia.length} videos cargados desde la PC de la iglesia`, 'ok');
        renderizarListas();

      } catch (e) {
        const esCors = e.message.includes('Failed to fetch') || e.message.includes('NetworkError');
        setEstado('❌ ' + (esCors ? 'Error de red (posible CORS)' : e.message), 'error');

        panelDisp.innerHTML = `
          <div class="empty">No se pudo cargar la lista de videos.</div>
          <div class="debug-box">Error: ${e.message}</div>
          <div class="pasos">
            <strong>Posibles causas:</strong><br>
            ${esCors
              ? '• El navegador bloqueó la petición (CORS).<br>  Intenta abrir este archivo desde un servidor local o usa Chrome sin restricciones.'
              : '• Verifica que tienes internet.<br>• Verifica que el API Key de JSONBin sea correcto.<br>• El Bin puede haber sido eliminado o privado.'
            }<br><br>
            Haz clic en 🔄 <strong>Reintentar</strong> para intentar de nuevo.
          </div>`;
      }
    }

    /* ── Filtro búsqueda ── */
    function filtrar(val) {
      filtroActual = val.toLowerCase().trim();
      renderDisponibles();
    }

    /* ── Render disponibles ── */
    function renderDisponibles() {
      const container = document.getElementById('lista-disponibles');
      const enLista   = new Set(playlistDomingo);
      const lista     = filtroActual
        ? videosIglesia.filter(v => v.name.toLowerCase().includes(filtroActual))
        : videosIglesia;

      document.getElementById('badge-disponibles').textContent = lista.length;

      if (!lista.length) {
        container.innerHTML = `<div class="empty">Sin resultados para "${filtroActual}"</div>`;
        return;
      }
      container.innerHTML = '';
      lista.forEach(video => {
        const yaEsta = enLista.has(video.filename);
        const li = document.createElement('li');
        if (yaEsta) li.classList.add('ya-en-lista');
        const fname = video.filename.replace(/'/g, "\\'");
        li.innerHTML = `
          <span class="nombre" title="${video.name}">${video.name}</span>
          <button class="btn-add" onclick="agregar('${fname}')" ${yaEsta ? 'disabled style="opacity:0.35"' : ''}>＋</button>`;
        container.appendChild(li);
      });
    }

    /* ── Render playlist domingo ── */
    function renderDomingo() {
      const container = document.getElementById('lista-domingo');
      document.getElementById('badge-domingo').textContent = playlistDomingo.length;
      if (!playlistDomingo.length) {
        container.innerHTML = `<div class="empty">Agrega videos desde la lista izquierda.<br>Se reproducirán en este orden el domingo.</div>`;
        return;
      }
      container.innerHTML = '';
      playlistDomingo.forEach((filename, i) => {
        const info   = videosIglesia.find(v => v.filename === filename);
        const nombre = info ? info.name : filename;
        const li     = document.createElement('li');
        li.innerHTML = `
          <span class="nombre" title="${nombre}">${i + 1}. ${nombre}</span>
          <div style="display:flex;gap:4px;flex-shrink:0">
            <button class="btn-up"   onclick="mover(${i},-1)" ${i===0 ? 'disabled style="opacity:0.3"' : ''}>▲</button>
            <button class="btn-down" onclick="mover(${i},+1)" ${i===playlistDomingo.length-1 ? 'disabled style="opacity:0.3"' : ''}>▼</button>
            <button class="btn-remove" onclick="quitar(${i})">✕</button>
          </div>`;
        container.appendChild(li);
      });
    }

    function renderizarListas() { renderDisponibles(); renderDomingo(); }

    function agregar(filename) {
      if (!playlistDomingo.includes(filename)) { playlistDomingo.push(filename); renderizarListas(); }
    }
    function quitar(i)     { playlistDomingo.splice(i, 1); renderDomingo(); }
    function mover(i, dir) {
      const j = i + dir;
      if (j < 0 || j >= playlistDomingo.length) return;
      [playlistDomingo[i], playlistDomingo[j]] = [playlistDomingo[j], playlistDomingo[i]];
      renderDomingo();
    }

    /* ── Guardar playlist ── */
    async function guardarPlaylist() {
      const btn = document.getElementById('btn-guardar');
      btn.disabled = true; btn.textContent = '⏳ Guardando...';
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_PLAYLIST}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
          body: JSON.stringify({ playlist: playlistDomingo, savedAt: new Date().toISOString() })
        });
        if (res.ok) {
          btn.textContent = '✅ Guardado';
          setTimeout(() => { btn.textContent = '💾 Guardar Playlist'; btn.disabled = false; }, 2500);
        } else {
          const err = await res.text();
          alert('Error al guardar: ' + err.substring(0, 200));
          btn.textContent = '💾 Guardar Playlist'; btn.disabled = false;
        }
      } catch (e) {
        alert('Error de red: ' + e.message);
        btn.textContent = '💾 Guardar Playlist'; btn.disabled = false;
      }
    }

    /* ── Arrancar ── */
    window.onload = cargarDatos;
  </script>
</body>
</html>
