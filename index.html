<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control Remoto - Alabanzas Iglesia</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1e1e24; color: #fff; margin: 0; padding: 20px; }
    h1 { text-align: center; color: #4f46e5; }
    .container { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; height: 80vh; }
    .panel { flex: 1; background: #2a2a35; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; }
    h2 { margin-top: 0; border-bottom: 2px solid #3f3f56; padding-bottom: 8px; font-size: 1.2rem; }
    .list { overflow-y: auto; flex: 1; list-style: none; padding: 0; margin: 0; }
    li { background: #3f3f56; padding: 10px; margin-bottom: 8px; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
    li:hover { background: #4f46e5; }
    .btn { background: #4f46e5; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 1rem; }
    .btn:hover { background: #4338ca; }
    .btn-add { background: #22c55e; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
    .btn-remove { background: #ef4444; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Planificador Domingo 🎶</h1>
  
  <div class="container">
    <!-- Panel Izquierdo: Videos Disponibles en la Iglesia -->
    <div class="panel">
      <h2>Videos en PC Iglesia</h2>
      <ul id="lista-disponibles" class="list"><li>Cargando videos de la iglesia...</li></ul>
    </div>

    <!-- Panel Derecho: Playlist del Domingo -->
    <div class="panel">
      <h2>Playlist Seleccionada</h2>
      <ul id="lista-domingo" class="list"></ul>
      <button class="btn" onclick="guardarPlaylist()">💾 Guardar Playlist del Domingo</button>
    </div>
  </div>

  <script>
    // --- CONFIGURACIÓN DE CREDENCIALES ---
    const API_KEY = '$2a$10$FC02j5gbHIHKA.wnoYQNqegrrC4EBf/gCyx1lR/oBRGi99Bj7aemC'; // Tu Master Key de JSONBin
    const BIN_VIDEOS = '6a4171f1da38895dfe0cb6b8';      // El Bin donde la iglesia sube sus 62 videos
    const BIN_PLAYLIST = '6a41792df5f4af5e293e5e04';  // El nuevo Bin para la selección del domingo

    let videosIglesia = [];
    let playlistDomingo = [];

// Al cargar la página, traemos los datos de la nube
    window.onload = async () => {
      try {
        // 1. Leer videos disponibles en la iglesia (¡ESTO SE HABÍA BORRADO!)
        const resVideos = await fetch(`https://api.jsonbin.io/v3/b/${BIN_VIDEOS}/latest`, {
          headers: { 'X-Master-Key': API_KEY }
        });
        const dataVideos = await resVideos.json();
        
        // Verificación segura de la estructura que envía la iglesia
        if (dataVideos.record && dataVideos.record.videos) {
          videosIglesia = dataVideos.record.videos;
        } else {
          videosIglesia = [];
        }

        // 2. Leer si ya había una playlist guardada antes
        const resPlay = await fetch(`https://api.jsonbin.io/v3/b/${BIN_PLAYLIST}/latest`, {
          headers: { 'X-Master-Key': API_KEY }
        });
        const dataPlay = await resPlay.json();
        
        // Extraemos de forma segura el array interno de la playlist
        if (dataPlay.record && dataPlay.record.playlist) {
          playlistDomingo = dataPlay.record.playlist;
        } else if (Array.isArray(dataPlay.record)) {
          playlistDomingo = dataPlay.record;
        } else {
          playlistDomingo = [];
        }

        // Limpiamos el texto de prueba "inicio" si es que existe
        playlistDomingo = playlistDomingo.filter(item => item !== "inicio");

        // Dibujar ambas listas en la pantalla
        renderizarListas();

      } catch (e) {
        alert("Error al conectar con JSONBin: " + e.message);
      }
    };

    function renderizarListas() {
      // Renderizar Disponibles
      const containerDisponibles = document.getElementById('lista-disponibles');
      containerDisponibles.innerHTML = '';
      videosIglesia.forEach(video => {
        const li = document.createElement('li');
        li.innerHTML = `<span>${video.name}</span> <button class="btn-add" onclick="agregarAPlaylist('${video.filename}')">＋</button>`;
        containerDisponibles.appendChild(li);
      });

      // Renderizar Playlist del Domingo
      const containerDomingo = document.getElementById('lista-domingo');
      containerDomingo.innerHTML = '';
      playlistDomingo.forEach((filename, index) => {
        // Buscamos el nombre limpio para mostrarlo bonito
        const videoInfo = videosIglesia.find(v => v.filename === filename);
        const nombreMostrar = videoInfo ? videoInfo.name : filename;

        const li = document.createElement('li');
        li.innerHTML = `<span>${index + 1}. ${nombreMostrar}</span> <button class="btn-remove" onclick="removerDePlaylist(${index})">✕</button>`;
        containerDomingo.appendChild(li);
      });
    }

    function agregarAPlaylist(filename) {
      playlistDomingo.push(filename);
      renderizarListas();
    }

    function removerDePlaylist(index) {
      playlistDomingo.splice(index, 1);
      renderizarListas();
    }

    async function guardarPlaylist() {
      try {
        const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_PLAYLIST}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': API_KEY
          },
          body: JSON.stringify(playlistDomingo)
        });

        if (response.ok) {
          alert("¡Playlist sincronizada con éxito para el domingo! 🎉");
        } else {
          alert("Error al guardar en la nube.");
        }
      } catch (e) {
        alert("Error de red: " + e.message);
      }
    }
  </script>
</body>
</html>
